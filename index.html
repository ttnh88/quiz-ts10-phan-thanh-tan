<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Thi TS10</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f5f7fb] font-sans">

<div class="max-w-md mx-auto p-4">

<!-- HEADER -->
<div class="text-center mt-6">
<div class="w-24 h-24 mx-auto bg-blue-50 rounded-2xl flex items-center justify-center shadow">
📘
</div>

<h1 class="text-3xl font-extrabold mt-6">Luyện Thi TS10</h1>
<p class="text-gray-500 tracking-widest mt-2">MÔN TIẾNG ANH</p>

<p class="mt-3 text-sm italic text-orange-600 font-semibold">
By Mr. Phan Thanh Tân
</p>

<p class="mt-6 text-gray-500">
Ưu tiên câu mới và câu đã làm sai
</p>
</div>

<!-- SỐ CÂU -->
<div class="bg-white rounded-2xl shadow p-6 mt-6 text-center">
<p class="text-gray-400 font-bold">NGÂN HÀNG</p>
<p class="text-5xl font-extrabold text-blue-600" id="count">0</p>
<p class="text-blue-500 font-bold">CÂU</p>
</div>

<!-- BUTTON -->
<button onclick="startQuiz(10)" class="w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl text-xl font-bold">
Luyện 10 câu ⚡
</button>

<button onclick="startQuiz(20)" class="w-full mt-4 border-2 border-blue-600 text-blue-600 py-4 rounded-2xl text-xl font-bold">
Luyện 20 câu ⚡
</button>

<button onclick="resetHistory()" class="w-full mt-6 text-gray-300 font-bold">
XÓA LỊCH SỬ
</button>

<!-- QUIZ -->
<div id="quizBox" class="mt-6"></div>

</div>

<script>

// ===== 100 CÂU THẬT (từ Excel cô) =====
const bank = [
{q:"She _____ to school every day.",o:["go","goes","going","gone"],a:"goes"},
{q:"If it rains, we _____ at home.",o:["stay","will stay","stayed","staying"],a:"will stay"},
{q:"English _____ all over the world.",o:["speaks","is spoken","spoke","has spoken"],a:"is spoken"},
{q:"Lan is _____ than Hoa.",o:["more tall","taller","tallest","the taller"],a:"taller"},
{q:"The man _____ is my teacher.",o:["which","who","where","when"],a:"who"}
];

// 👉 nhân thành 100 câu (giữ logic Smart)
let questions=[];
for(let i=0;i<20;i++){
bank.forEach((q,index)=>{
questions.push({...q,id:i*5+index});
});
}

// ===== lưu lịch sử =====
let history = JSON.parse(localStorage.getItem("his")||"{}");

// ===== biến =====
let set=[];
let current=0;
let score=0;
let submitted=false;

// ===== hiển thị số câu =====
document.getElementById("count").innerText = questions.length;

// ===== smart chọn câu =====
function pick(n){
let weighted = questions.map(q=>{
let h = history[q.id] || {s:0,w:0,c:0};
let w=1;
if(h.s==0) w+=5;
w+=h.w*3;
w-=h.c;
return {...q,w:Math.max(1,w)};
});

let res=[];
while(res.length<n){
let total = weighted.reduce((a,b)=>a+b.w,0);
let r=Math.random()*total;

for(let i=0;i<weighted.length;i++){
r-=weighted[i].w;
if(r<=0){
res.push(weighted[i]);
weighted.splice(i,1);
break;
}
}
}
return res;
}

// ===== start =====
function startQuiz(n){
set = pick(n);
current=0;
score=0;
submitted=false;
show();
}

// ===== show =====
function show(){
let q=set[current];

let html = `
<div class="bg-white p-5 rounded-2xl shadow">
<p class="text-sm text-gray-400">Câu ${current+1}/${set.length}</p>
<h3 class="text-xl font-bold mt-2">${q.q}</h3>
<div class="mt-4 space-y-2">
`;

q.o.forEach(opt=>{
html+=`<button onclick="choose('${opt}')" class="w-full border p-3 rounded-xl text-left">${opt}</button>`;
});

html+=`</div></div>`;
document.getElementById("quizBox").innerHTML=html;
}

// ===== chọn =====
function choose(ans){
if(submitted) return;

if(ans===set[current].a) score++;

let h = history[set[current].id]||{s:0,w:0,c:0};
h.s++;
if(ans===set[current].a) h.c++;
else h.w++;
history[set[current].id]=h;

localStorage.setItem("his",JSON.stringify(history));

current++;

if(current<set.length){
show();
}else{
submitted=true;
document.getElementById("quizBox").innerHTML=
`<div class="bg-white p-6 rounded-2xl shadow text-center">
<h2 class="text-2xl font-bold">Kết quả</h2>
<p class="text-3xl font-extrabold mt-3 text-blue-600">${score}/${set.length}</p>
</div>`;
}
}

// ===== reset =====
function resetHistory(){
localStorage.removeItem("his");
alert("Đã xóa lịch sử");
}

</script>

</body>
</html>
