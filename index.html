<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quiz Tuyển Sinh 10</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-2">Luyện Thi Tuyển Sinh 10</h1>
<p class="text-sm text-gray-500 mb-4">Giáo viên: Phan Thanh Tân</p>

<button onclick="startQuiz()" class="bg-blue-500 text-white px-4 py-2 rounded">
Bắt đầu làm bài
</button>

<div id="quiz" class="mt-6"></div>

</div>

<script>
const questions = [
  {
    q: "She _____ to school every day.",
    options: ["go","goes","going","gone"],
    answer: "goes"
  },
  {
    q: "English _____ all over the world.",
    options: ["speaks","is spoken","spoke","has spoken"],
    answer: "is spoken"
  }
];

let current = 0;
let score = 0;

function startQuiz(){
  current = 0;
  score = 0;
  showQuestion();
}

function showQuestion(){
  const q = questions[current];
  let html = "<h2 class='font-bold mb-3'>" + q.q + "</h2>";

  q.options.forEach(opt=>{
    html += `<button onclick="check('${opt}')" class="block w-full text-left border p-2 mb-2 rounded">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML = html;
}

function check(ans){
  if(ans === questions[current].answer){
    score++;
  }

  current++;

  if(current < questions.length){
    showQuestion();
  } else {
    document.getElementById("quiz").innerHTML =
      "<h2>Kết quả: " + score + "/" + questions.length + "</h2>";
  }
}
</script>

</body>
</html>
